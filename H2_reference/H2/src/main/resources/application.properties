# The name of our Spring Boot application
spring.application.name=H2

# ================================
# H2 DATABASE SETTINGS
# ================================

# Enable the H2 Console - this allows you to view the database in a browser
# (usually at http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# The connection URL for the in-memory database.
# 'mem' means it stays in RAM and resets when the app restarts.
spring.datasource.url=jdbc:h2:mem:testdb

# The standard H2 database driver
spring.datasource.driver-class-name=org.h2.Driver

# Default credentials for H2 (Username is 'sa', Password is empty)
spring.datasource.username=sa
spring.datasource.password=

# ================================
# JPA / HIBERNATE SETTINGS
# ================================

# Tells Hibernate (the database engine) which SQL "dialect" to speak.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# 'update' means Hibernate will automatically create or update 
# database tables to match your @Entity Java classes.
spring.jpa.hibernate.ddl-auto=update